
<!DOCTYPE html>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#0b0c0f;color:#c8cdd6;min-height:100vh}

.hero{text-align:center;padding:52px 20px 36px;border-bottom:1px solid rgba(255,255,255,0.04)}
.hero h1{font-size:3.2em;margin-bottom:10px;color:#e2e8f0;letter-spacing:0.18em;font-weight:300}
.hero .sub{font-size:0.95em;color:#4a5568;letter-spacing:0.06em;max-width:560px;margin:0 auto;line-height:1.7}
.hero .tag{display:inline-block;font-size:0.65em;letter-spacing:0.22em;color:#4a5568;border:1px solid #2d3748;padding:3px 12px;border-radius:2px;margin-bottom:16px;text-transform:uppercase}

.container{max-width:1200px;margin:0 auto;padding:0 20px 60px}

#canvas-container{width:100%;height:540px;background:radial-gradient(ellipse at center,#0d0f14 0%,#080a0d 100%);border-radius:4px;overflow:hidden;margin:32px 0 10px;border:1px solid rgba(255,255,255,0.04)}
canvas{display:block;cursor:grab}
canvas:active{cursor:grabbing}
.hint{text-align:center;margin-bottom:40px;color:#2a3040;font-size:0.78em;letter-spacing:0.12em;text-transform:uppercase}

.section-title{font-size:0.7em;letter-spacing:0.25em;text-transform:uppercase;color:#2d3748;margin-bottom:28px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.04)}

.dims-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px;margin-bottom:60px}

.dcard{background:#0f1117;border-radius:3px;padding:24px;border:1px solid #1a1e28;border-left:3px solid;transition:border-color 0.2s,background 0.2s}
.dcard:hover{background:#111318}
.dcard .cat{font-size:0.68em;color:#2d3748;margin-bottom:7px;text-transform:uppercase;letter-spacing:0.14em}
.dcard h3{font-size:1.15em;margin-bottom:10px;display:flex;align-items:center;gap:10px;font-weight:400;letter-spacing:0.04em}
.badge{font-size:0.55em;padding:2px 8px;border-radius:2px;font-weight:600;letter-spacing:0.1em;border:1px solid;white-space:nowrap}
.dcard .desc{font-size:0.88em;line-height:1.8;color:#5a6478}
.threats{background:rgba(220,38,38,0.04);border-left:2px solid rgba(180,40,40,0.3);padding:12px 14px;margin-top:14px;border-radius:2px}
.threats h4{color:#7a3030;font-size:0.7em;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:8px}
.threats ul{list-style:none;font-size:0.82em;line-height:1.8;color:#4a3535}
.threats li::before{content:"— ";color:#5a3535}
</style>

<div class="hero">
  <div class="tag">CAGED Framework</div>
  <h1>SPHERED</h1>
  <p class="sub">Seven independent dimensions of operational defence — a continuous, multi-domain model for the threats that exist now and those that are coming</p>
</div>

<div class="container">
  <div id="canvas-container"><canvas id="sc"></canvas></div>
  <div class="hint">drag to rotate &nbsp;·&nbsp; watch dimensions interact as rings pass through each other</div>
  <div class="section-title">The Seven SPHERED Dimensions</div>
  <div class="dims-grid" id="dgrid"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const DIMS=[
  {
    name:'Security',cat:'Operational Confidentiality',badge:'Core',
    col:0x4a7fa5,cs:'#4a7fa5',bc:'#2a4a62',bb:'#2a4a62',bco:'#3a6a8a',
    xRot:0.003,yRot:0.004,
    desc:'Who sees what, at which echelon, right now. In defence, need-to-know is not a policy checkbox — it is a live engine state enforced continuously. Information reaching the wrong level too early or too late can compromise an entire operation.',
    threats:null
  },
  {
    name:'Provenance',cat:'Verified Origin of Orders and Intelligence',badge:'Elevated',
    col:0x3a8a62,cs:'#3a8a62',bc:'#1e4a34',bb:'#1e4a34',bco:'#2a6a4a',
    xRot:-0.004,yRot:0.003,
    desc:'Is this order authentic? Is this intelligence from a trusted, uncompromised source? Chain of custody verified at every node, continuously. Unlike Hardening — which confirms data was not changed — Provenance confirms it came from the right source through an unbroken chain. In an age of AI-generated content and deepfake command, this is the difference between acting on truth and acting on adversary fiction.',
    threats:['AI-generated orders from spoofed commanders','Compromised intelligence feeds turned by the adversary','Injected operational orders in degraded communications','Supply chain compromise of defence systems at origin']
  },
  {
    name:'Hardening',cat:'Mission Data Integrity',badge:'Core',
    col:0x3a7a8a,cs:'#3a7a8a',bc:'#1e3a42',bb:'#1e3a42',bco:'#2a5a68',
    xRot:0.004,yRot:-0.003,
    desc:'Operational data remains unaltered. Tamper detection running at mission speed. A corrupted targeting order, a modified grid reference, an altered logistics report — each is as dangerous as a direct hostile action and harder to detect because it appears entirely legitimate.',
    threats:null
  },
  {
    name:'Evidence',cat:'Command Accountability',badge:'Elevated',
    col:0x6a4a8a,cs:'#6a4a8a',bc:'#3a2a5a',bb:'#3a2a5a',bco:'#4a3a72',
    xRot:-0.003,yRot:-0.004,
    desc:'Every decision, order and action is attributable, timestamped and undeniable. The audit trail is continuous — not retrospective. As autonomous systems and AI-assisted decision-making become operational realities, the accountability chain must be unbreakable. Who authorised this? Which system executed it? When? Evidence makes these questions answerable.',
    threats:['Deniable orders in autonomous engagement chains','Attribution gaps across coalition command structures','Adversary manipulation of command logs post-incident','Rules of Engagement accountability under international law']
  },
  {
    name:'Resilience',cat:'Continuity Under Adversarial Conditions',badge:'Core',
    col:0x8a6a2a,cs:'#8a6a2a',bc:'#4a3a18',bb:'#4a3a18',bco:'#6a5020',
    xRot:0.003,yRot:0.005,
    desc:'Operate degraded. Recover fast. Never lose the operational picture regardless of what the adversary destroys, disrupts or denies. Resilience in defence is not disaster recovery — it is the continuous capacity to sustain mission awareness and command function while under active attack across multiple domains simultaneously.',
    threats:null
  },
  {
    name:'Environment',cat:'Operational Domain Context',badge:'New',
    col:0x4a5468,cs:'#6a7a92',bc:'#2a3040',bb:'#2a3040',bco:'#3a4558',
    xRot:-0.004,yRot:0.002,
    desc:'Cyber, kinetic, hybrid, cognitive, space. The active domain shapes how every other dimension must operate. A Provenance failure in a cyber environment looks entirely different from one in a kinetic operation. SPHERED is multi-domain by design — the same seven dimensions govern across all theatres, calibrated to the environment in which they operate.',
    threats:null
  },
  {
    name:'Defence',cat:'Active Posture — Full Spectrum',badge:'Defence-Exclusive',
    col:0xb8860b,cs:'#c8960b',bc:'#5a4000',bb:'#6a4a00',bco:'#9a7000',
    xRot:0.005,yRot:-0.004,
    desc:'Not passive protection. Continuous dual-posture awareness — defensive and offensive simultaneously. Not a toggle. A live engine state that reads across all six other dimensions and surfaces to command the critical question in real time: are we winning or losing this operation right now, and when must the posture shift? This dimension has no equivalent in any existing information security framework. It exists only in SPHERED because only defence requires it.',
    threats:['Posture lag — operating defensively while the situation demands offensive action','Missed escalation signals buried in multi-domain operational noise','Infrastructure attacks misread as tactical when they are strategic','Shaping operations that precede a larger adversary action going undetected']
  },
];

const grid=document.getElementById('dgrid');
DIMS.forEach(d=>{
  const card=document.createElement('div');
  card.className='dcard';
  card.style.borderLeftColor=d.bc;
  card.innerHTML=`
    <div class="cat">${d.cat}</div>
    <h3 style="color:${d.cs}">${d.name}<span class="badge" style="color:${d.bco};border-color:${d.bb}">${d.badge.toUpperCase()}</span></h3>
    <div class="desc">${d.desc}</div>
    ${d.threats?`<div class="threats"><h4>Threat vectors</h4><ul>${d.threats.map(t=>`<li>${t}</li>`).join('')}</ul></div>`:''}
  `;
  grid.appendChild(card);
});

const container=document.getElementById('canvas-container');
const canvas=document.getElementById('sc');
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x080a0d);
const camera=new THREE.PerspectiveCamera(45,container.clientWidth/container.clientHeight,0.1,1000);
camera.position.z=10;
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setSize(container.clientWidth,container.clientHeight);

const R=3;
scene.add(new THREE.Mesh(new THREE.SphereGeometry(R,24,24),new THREE.MeshBasicMaterial({color:0x141820,wireframe:true,transparent:true,opacity:0.18})));
scene.add(new THREE.AmbientLight(0xffffff,0.25));
const pl=new THREE.PointLight(0xffffff,0.6);pl.position.set(10,10,10);scene.add(pl);
const pl2=new THREE.PointLight(0x4466aa,0.3);pl2.position.set(-8,-6,4);scene.add(pl2);

const rings=[];
DIMS.forEach(d=>{
  const rg=new THREE.Group();scene.add(rg);
  const ring=new THREE.Mesh(new THREE.TorusGeometry(R,0.04,16,100),new THREE.MeshBasicMaterial({color:d.col,transparent:true,opacity:0.65}));
  rg.add(ring);
  const ball=new THREE.Mesh(new THREE.SphereGeometry(0.18,16,16),new THREE.MeshPhongMaterial({color:d.col,emissive:d.col,emissiveIntensity:1.0}));
  ball.position.set(R,0,0);ring.add(ball);
  rings.push({group:rg,xRot:d.xRot,yRot:d.yRot});
});

let isDragging=false,prevX=0,prevY=0;
const userRot={x:0,y:0};
canvas.addEventListener('mousedown',e=>{isDragging=true;prevX=e.clientX;prevY=e.clientY;});
window.addEventListener('mousemove',e=>{if(!isDragging)return;userRot.y+=(e.clientX-prevX)*0.01;userRot.x+=(e.clientY-prevY)*0.01;prevX=e.clientX;prevY=e.clientY;});
window.addEventListener('mouseup',()=>isDragging=false);
canvas.addEventListener('touchstart',e=>{isDragging=true;prevX=e.touches[0].clientX;prevY=e.touches[0].clientY;},{passive:true});
window.addEventListener('touchmove',e=>{if(!isDragging)return;userRot.y+=(e.touches[0].clientX-prevX)*0.01;userRot.x+=(e.touches[0].clientY-prevY)*0.01;prevX=e.touches[0].clientX;prevY=e.touches[0].clientY;},{passive:true});
window.addEventListener('touchend',()=>isDragging=false);

function animate(){requestAnimationFrame(animate);rings.forEach(r=>{r.group.rotation.x+=r.xRot;r.group.rotation.y+=r.yRot;});scene.rotation.x=userRot.x;scene.rotation.y=userRot.y;renderer.render(scene,camera);}
animate();
window.addEventListener('resize',()=>{camera.aspect=container.clientWidth/container.clientHeight;camera.updateProjectionMatrix();renderer.setSize(container.clientWidth,container.clientHeight);});
</script>
